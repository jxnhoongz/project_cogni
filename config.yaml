# Project Cogni — pipeline configuration.
# Everything the stages need that isn't a secret. Secrets live in .env.

# --- LLM routing (per stage) -------------------------------------------------
# Each stage picks a provider + model:
#   provider "claude"     -> local `claude` CLI, billed to the Claude subscription
#                            (NOT per-token). Use for Claude models.
#   provider "openrouter" -> OpenRouter API (per-token). Used only for image gen.
# openrouter model slugs: https://openrouter.ai/models
llm:
  base_url: "https://openrouter.ai/api/v1"
  timeout_sec: 120
  max_tokens: 8000
  models:
    ingest:
      provider: "claude"                      # cheap: outline + key ideas
      model: "claude-haiku-4-5"
    script:
      provider: "claude"                      # English verdict narration (POV, not summary)
      model: "claude-sonnet-5"                # fast + strong; use claude-opus-4-8 for a slower "polish" pass
    visuals:
      provider: "claude"                      # creative: two keyframe prompts + a motion prompt per scene
      model: "claude-sonnet-5"
    review:
      provider: "claude"                      # validator: gate visuals before spending image/clip credits
      model: "claude-opus-4-8"                # opus: stricter judgment (this gates real spend)
    script_review:
      provider: "claude"                      # critic: flag weak narration (hook, filler, vague, summary-not-verdict)
      model: "claude-opus-4-8"                # opus: stricter critique (revise still uses the sonnet `script` writer)
    fact_review:
      provider: "claude"                      # grounding: check narration claims against book.md (contradicts / not-in-book / opinion)
      model: "claude-opus-4-8"                # opus: careful reading of the book vs the script

# --- Ingest (book.md -> outline.json) ----------------------------------------
ingest:
  max_input_chars: 240000    # ~60k tokens; larger books are evenly sampled (logged)
  min_ideas: 6
  max_ideas: 12

# --- Script (outline.json -> scenes.json) ------------------------------------
script:
  # "short" = one pass, min/max_scenes below (~4-5 min, fast/cheap — good for tests).
  # "long"  = chaptered deep-dive (the `long:` block below), ~30-45 min for production.
  mode: "short"
  min_scenes: 8              # short mode: scene count range
  max_scenes: 14
  long:                      # long mode: a structure pass, then one call per chapter
    target_minutes: 37       # aim (~30-45 min); guidance to the model
    min_chapters: 5
    max_chapters: 7
    min_scenes_per_chapter: 10
    max_scenes_per_chapter: 14
  # The narration point of view. This is a VERDICT, not a summary — a stance.
  # Override per book with `--angle "..."`.
  angle: >-
    Take a clear, honest point of view — this is a verdict, not a summary. Say
    what the book genuinely gets right, where it is weak, vague, or overstated,
    and who it actually helps in real life. Warm, specific, a little skeptical.
    Written to be heard: natural spoken narration, first person.

# --- Narration (scenes.json narration -> audio/scene_XXX.mp3) -----------------
# provider "edge" -> edge-tts (free, no key). Voices e.g. en-GB-RyanNeural,
# en-US-AndrewNeural, en-US-GuyNeural. (openai/elevenlabs can be added later.)
tts:
  provider: "edge"
  voice: "en-GB-RyanNeural"
  # Subtitles show a few words at a time (chunked from edge-tts word timings),
  # not a whole sentence. Lower these for shorter on-screen phrases.
  subtitle_max_words: 5
  subtitle_max_chars: 42

# --- Image generation --------------------------------------------------------
# provider "openrouter" -> OpenRouter /images (uses OPENROUTER_API_KEY, ~$0.04/image
# on gemini-2.5-flash-image, ~$0.50 for a 13-scene video; images cache so re-runs
# are free). provider "mock" -> free placeholder PNGs for testing.
image:
  provider: "openrouter"
  model: "google/gemini-2.5-flash-image"
  aspect_ratio: "16:9"
  timeout_sec: 180

# --- Video assembly ----------------------------------------------------------
video:
  width: 1920
  height: 1080
  fps: 30
  ken_burns_zoom: 1.08       # subtle zoom across a scene's duration
  music_volume: 0.08         # low background music (0.0-1.0)
  fade_sec: 0.5
  subtitles: true            # burn synced subtitles from the narration (edge-tts timings)
  burn_captions: false       # the old on_screen_text label bar (off when subtitles on)
  encoder: "nvenc"           # NVIDIA hardware encoder (this machine: RTX 3060). Also:
                             #   "videotoolbox" = Apple Silicon HW, "x264" = software (portable).
  video_bitrate: "12M"       # target bitrate for the hardware (nvenc/videotoolbox) encoder
  preview_scene_sec: 4.0     # silent placeholder length when a scene has no recording

# --- Filesystem layout -------------------------------------------------------
# `paths` are per-book, resolved under projects/<active-book-slug>/.
paths:
  book_md: "book.md"
  outline: "outline.json"
  scenes: "scenes.json"
  audio: "audio"                       # narration scene_XXX.mp3 files
  images: "images"                     # generated stills
  clips: "clips"                       # optional Higgsfield hero clips
  output: "output"                     # final.mp4

# `shared` paths are repo-level, shared across all books.
shared:
  music: "assets/audio"                # background music source
