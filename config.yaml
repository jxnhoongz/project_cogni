# Project Cogni — pipeline configuration.
# Everything the stages need that isn't a secret. Secrets live in .env.

# --- LLM routing (per stage) -------------------------------------------------
# Each stage picks a provider + model:
#   provider "claude"     -> local `claude` CLI, billed to the Claude subscription
#                            (NOT per-token). Use for Claude models.
#   provider "openrouter" -> OpenRouter API (per-token). Use ONLY for models the
#                            subscription can't reach, e.g. Gemini for Khmer.
# openrouter model slugs: https://openrouter.ai/models
llm:
  base_url: "https://openrouter.ai/api/v1"
  timeout_sec: 120
  max_tokens: 8000
  models:
    ingest:
      provider: "claude"                      # cheap: outline + key ideas
      model: "claude-haiku-4-5"
    script_en:
      provider: "claude"                      # English narration (POV, not summary)
      model: "claude-sonnet-5"                # fast + strong; use claude-opus-4-8 for a slower "polish" pass
    script_km:
      provider: "claude"                      # natural spoken Khmer (subscription)
      model: "claude-sonnet-5"                # fast + strong; Opus batches too slow here

# --- Ingest (book.md -> outline.json) ----------------------------------------
ingest:
  max_input_chars: 240000    # ~60k tokens; larger books are evenly sampled (logged)
  min_ideas: 6
  max_ideas: 12

# --- Script (outline.json -> scenes.json + recording_script.txt) -------------
script:
  min_scenes: 8
  max_scenes: 14
  # The narration point of view. This is COMMENTARY, not a summary — a stance.
  # Override per book with `--angle "..."` (a respected classic gets a
  # respectful-but-opinionated take; a criticized book gets real critique).
  angle: >-
    Take a clear, honest point of view — this is commentary, not a summary. Say
    what the ideas genuinely get right, where they are weak, vague, or overstated,
    and whether they actually apply to a young person on a normal salary in Phnom
    Penh, Cambodia. Warm, specific, conversational, a little skeptical. First person.
  # Optional few-shot file of the user's own natural spoken Khmer lines (one per
  # line). Used to style the Khmer if present; ignored if absent.
  khmer_examples: "khmer_style_examples.txt"

# --- Image generation --------------------------------------------------------
# provider "mock" writes a placeholder PNG (wired in Stage 5); swap to a real
# provider later. env_key names the .env variable holding the provider's key.
image:
  provider: "mock"
  model: "dall-e-3"
  size: "1792x1024"          # 16:9
  env_key: "IMAGE_PROVIDER_API_KEY"

# --- Video assembly ----------------------------------------------------------
video:
  width: 1920
  height: 1080
  fps: 30
  ken_burns_zoom: 1.08       # subtle zoom across a scene's duration
  music_volume: 0.08         # low background music (0.0-1.0)
  fade_sec: 0.5
  burn_captions: true

# --- Filesystem layout (relative to project root) ----------------------------
paths:
  input: "input"                       # uploaded book + converted book.md
  audio: "audio"                       # my recorded scene_XXX.wav files
  images: "images"                     # generated stills
  clips: "clips"                       # optional Higgsfield hero clips
  output: "output"                     # final.mp4
  music: "assets/audio"                # background music source
  book_md: "input/book.md"
  outline: "outline.json"
  scenes: "scenes.json"
  recording_script: "recording_script.txt"
