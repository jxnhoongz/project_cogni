# Project Cogni — pipeline configuration.
# Everything the stages need that isn't a secret. Secrets live in .env.

# --- LLM routing (per stage) -------------------------------------------------
# Each stage picks a provider + model:
#   provider "claude"     -> local `claude` CLI, billed to the Claude subscription
#                            (NOT per-token). Use for Claude models.
#   provider "openrouter" -> OpenRouter API (per-token). Used only for image gen.
# openrouter model slugs: https://openrouter.ai/models
llm:
  base_url: "https://openrouter.ai/api/v1"
  timeout_sec: 120
  max_tokens: 8000
  models:
    ingest:
      provider: "claude"                      # cheap: outline + key ideas
      model: "claude-haiku-4-5"
    script:
      provider: "claude"                      # English verdict narration (POV, not summary)
      model: "claude-opus-4-8"                # opus: the script IS the product — worth the slower pass
                                              # (was sonnet-5 for books 1-3; prose felt templated)
    visuals:
      provider: "claude"                      # creative: two keyframe prompts + a motion prompt per scene
      model: "claude-sonnet-5"
    review:
      provider: "claude"                      # validator: gate visuals before spending image/clip credits
      model: "claude-opus-4-8"                # opus: stricter judgment (this gates real spend)
    script_review:
      provider: "claude"                      # critic: flag weak narration (hook, filler, vague, summary-not-verdict)
      model: "claude-opus-4-8"                # opus: stricter critique (revise still uses the sonnet `script` writer)
    fact_review:
      provider: "claude"                      # grounding: check narration claims against book.md (contradicts / not-in-book / opinion)
      model: "claude-opus-4-8"                # opus: careful reading of the book vs the script
    modes:
      provider: "claude"                      # judgment: which beats earn motion (LOW/MEDIUM/HIGH) + motion prompts
      model: "claude-opus-4-8"                # opus: careful spend judgment (motion costs Higgsfield credits)

# --- Ingest (book.md -> outline.json) ----------------------------------------
ingest:
  max_input_chars: 240000    # ~60k tokens; larger books are evenly sampled (logged)
  min_ideas: 6
  max_ideas: 12

# --- Script (outline.json -> scenes.json) ------------------------------------
script:
  # "short" = one pass, min/max_scenes below (~4-5 min, fast/cheap — good for tests).
  # "long"  = chaptered deep-dive (the `long:` block below), ~30-45 min for production.
  mode: "long"
  min_scenes: 8              # short mode: scene count range
  max_scenes: 14
  long:                      # long mode: a structure pass, then one call per chapter
    target_minutes: 30       # aim (~30 min); guidance to the model
    min_chapters: 5
    max_chapters: 7
    min_scenes_per_chapter: 10
    max_scenes_per_chapter: 14
  # The narration point of view. This is a VERDICT, not a summary — a stance.
  # Override per book with `--angle "..."`.
  # NOTE: this text is injected into EVERY chapter call as "POINT OF VIEW (follow this
  # closely)". Do NOT enumerate a fixed list of verdict moves here — the old wording
  # ("say what it gets right, where it is overstated, and who it helps") templated every
  # book's climax and made three videos reuse the same scaffolding. Keep it a stance +
  # a demand for book-specific concreteness, and let each book's own material decide the
  # shape of the judgement.
  angle: >-
    Reach an honest, book-specific verdict — the one thing that most survives scrutiny and the
    one that least does, decided by THIS book's own material. Do not import a recurring house
    opinion (e.g. a standing "it ignores privilege" line); let each book earn its own judgement.

# --- Motion modes (scenes.json -> per-scene mode + video_prompt) -------------
# Tag each beat LOW (free Ken Burns) / MEDIUM / HIGH; write a motion prompt for the
# animated ones. Beat 1 (cold open) is always forced HIGH.
# NOTE (learned on book #1): each animated clip is ~8s but most beats' narration runs
# ~12-18s, so the clip plays then FREEZES on its last frame for the remainder — reads
# as a stall. And low-poly stills with Ken Burns already look alive, so motion adds
# little for a lot of credits (~36 cr/clip). Keep this small: hook + a few punches.
# Prefer animating SHORT beats (narration <= ~8s) so the clip covers the whole scene.
modes:
  max_animated: 4            # cap on MEDIUM+HIGH beats (each costs ~36 Higgsfield credits)

# --- Narration (scenes.json narration -> audio/scene_XXX.mp3) -----------------
# provider "edge" -> edge-tts (free, no key). Voices e.g. en-GB-RyanNeural,
# en-US-AndrewNeural, en-US-GuyNeural. (openai/elevenlabs can be added later.)
tts:
  provider: "edge"
  voice: "en-US-BrianMultilingualNeural"   # Cognibot — casual, natural
  # Speaking-rate offset (edge-tts), e.g. "-15%". This is the LENGTH LEVER: slow Brian
  # down instead of padding the script. Measured 2026-07-20: Brian's default is ~167 wpm
  # and -20% gives ~133 wpm. Leave empty unless a script comes up short — the 4,041-word
  # Psychology of Money script already lands ~24 min at the default, so it needs no slowing.
  rate: ""
  # Subtitles show a few words at a time (chunked from edge-tts word timings),
  # not a whole sentence. Lower these for shorter on-screen phrases.
  subtitle_max_words: 5
  subtitle_max_chars: 42

# --- Image generation --------------------------------------------------------
# provider "openrouter" -> OpenRouter /images (uses OPENROUTER_API_KEY, ~$0.039/image,
# ~$3.25 for a 84-image book; images cache so re-runs are free).
# provider "mock" -> free placeholder PNGs for testing.
#
# Model chosen by bake-off (2026-07-20, 3 prompts x 4 models, $0.32): Nano Banana 2 Lite
# costs the SAME as the old gemini-2.5-flash-image but is clearly better (2.5-flash
# rendered a smiling face for "tense sweating" and empty backgrounds) and is natively
# 16:9 (1376x768). Rejected: gpt-5-image-mini — 4x cheaper but OpenAI image models only
# do 1024x1024/1536x1024/1024x1536, i.e. NO 16:9, so every frame would need a ~16% crop.
# Nano Banana 2 (~$0.077) and Nano Banana Pro (~$0.155, ~$13/book) aren't worth the jump.
image:
  provider: "openrouter"     # Gemini (quality) — local SDXL/comfy was lower quality
  model: "google/gemini-3.1-flash-lite-image"   # Nano Banana 2 Lite
  aspect_ratio: "16:9"
  timeout_sec: 180
  comfy:                     # local SDXL: DreamShaper XL Turbo + polygon-style LoRA
    ckpt: "dreamshaperXL_turbo.safetensors"
    lora: "polygon-style-sdxl.safetensors"
    lora_strength: 0.9       # sweet spot: clean faceting without over-cook
    trigger: "ral-polygon"   # polygon LoRA activation token (prepended to prompt)
    steps: 7                 # DreamShaper Turbo = few steps
    cfg: 2.0
    gen_width: 1344          # SDXL native-ish 16:9; upscaled below
    gen_height: 768
    out_width: 2560          # Lanczos-upscaled delivery size (Ken Burns headroom)
    out_height: 1440
    timeout_sec: 300

# --- Video assembly ----------------------------------------------------------
video:
  width: 1920
  height: 1080
  fps: 30
  ken_burns_zoom: 1.08       # subtle zoom across a scene's duration
  music_volume: 0.08         # low background music (0.0-1.0)
  fade_sec: 0.5
  subtitles: true            # burn synced subtitles from the narration (edge-tts timings)
  # Burned-subtitle look (Risograph theme). Colors are #RRGGBB.
  subtitle:
    font: "Trebuchet MS"     # any installed font; a cleaner face than the old DejaVu
    font_size: 15
    text_color: "F1EDE4"     # cream
    box_color: "14332E"      # dark teal backing
    box_alpha: 64            # 0=solid .. 255=invisible; ~75% opaque soft bar
    border_style: 4          # 4 = soft box hugging the text (not the harsh full-width bar)
    outline: 0
    shadow: 0
    margin_v: 55             # lift off the bottom edge
  burn_captions: false       # the old on_screen_text label bar (off when subtitles on)
  encoder: "nvenc"           # NVIDIA hardware encoder (this machine: RTX 3060). Also:
                             #   "videotoolbox" = Apple Silicon HW, "x264" = software (portable).
  video_bitrate: "12M"       # target bitrate for the hardware (nvenc/videotoolbox) encoder
  preview_scene_sec: 4.0     # silent placeholder length when a scene has no recording

# --- Filesystem layout -------------------------------------------------------
# `paths` are per-book, resolved under projects/<active-book-slug>/.
paths:
  book_md: "book.md"
  outline: "outline.json"
  scenes: "scenes.json"
  audio: "audio"                       # narration scene_XXX.mp3 files
  images: "images"                     # generated stills
  clips: "clips"                       # optional Higgsfield hero clips
  output: "output"                     # final.mp4

# `shared` paths are repo-level, shared across all books.
shared:
  music: "assets/audio"                # background music source
